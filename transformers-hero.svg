<svg width="1000" height="260" viewBox="0 80 1000 260" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="nodegrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4fd1ff"/>
      <stop offset="100%" stop-color="#9f7aea"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- token nodes -->
  <g font-family="monospace" font-size="15" fill="#333">
    <text x="80" y="170">The</text>
    <text x="80" y="195">cat</text>
    <text x="80" y="220">sat</text>
    <text x="80" y="245">on</text>
    <text x="80" y="270">the</text>
    <text x="80" y="295">mat</text>
  </g>

  <!-- token circles -->
  <g fill="url(#nodegrad)" filter="url(#glow)">
    <circle cx="170" cy="165" r="6"/>
    <circle cx="170" cy="190" r="6"/>
    <circle cx="170" cy="215" r="6"/>
    <circle cx="170" cy="240" r="6"/>
    <circle cx="170" cy="265" r="6"/>
    <circle cx="170" cy="290" r="6"/>
  </g>

  <!-- transformer core -->
  <circle cx="480" cy="230" r="45"
          stroke="#6b8cff"
          stroke-width="2"
          fill="none"
          opacity="0.7"/>

  <circle cx="480" cy="230" r="10"
          fill="#6b8cff"
          filter="url(#glow)"/>

  <!-- attention connections -->
  <g stroke="#8aa4ff" stroke-opacity="0.6">
    <line x1="170" y1="165" x2="480" y2="230"/>
    <line x1="170" y1="190" x2="480" y2="230"/>
    <line x1="170" y1="215" x2="480" y2="230"/>
    <line x1="170" y1="240" x2="480" y2="230"/>
    <line x1="170" y1="265" x2="480" y2="230"/>
    <line x1="170" y1="290" x2="480" y2="230"/>
  </g>

  <!-- attention heads -->
  <g fill="url(#nodegrad)" filter="url(#glow)">
    <circle cx="640" cy="160" r="7"/>
    <circle cx="700" cy="200" r="7"/>
    <circle cx="700" cy="260" r="7"/>
    <circle cx="640" cy="300" r="7"/>
  </g>

  <!-- output connections -->
  <g stroke="#8aa4ff" stroke-opacity="0.6">
    <line x1="480" y1="230" x2="640" y2="160"/>
    <line x1="480" y1="230" x2="700" y2="200"/>
    <line x1="480" y1="230" x2="700" y2="260"/>
    <line x1="480" y1="230" x2="640" y2="300"/>
  </g>

  <!-- labels -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#444">
    <text x="760" y="165">Text Tasks</text>
    <text x="760" y="205">Chat / LLMs</text>
    <text x="760" y="265">Multimodal</text>
    <text x="760" y="305">Knowledge</text>
  </g>

</svg>
